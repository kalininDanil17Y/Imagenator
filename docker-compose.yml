version: '3.0'
services:
  nginx:
    image: nginx
    ports:
      - 80:80
    volumes:
      - ./:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/log:/var/log/nginx
    links:
      - php

  php:
    image: php:7.4-fpm-alpine
    volumes:
      - ./:/usr/share/nginx/html