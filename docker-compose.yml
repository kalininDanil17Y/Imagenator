version: '3.0'
services:
  nginx:
    image: nginx
    ports:
      - 80:80
    volumes:
      - ./:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/log:/var/log/nginx
    links:
      - php
  php:
    image: php:7.4-fpm-alpine
    volumes:
      - ./:/usr/share/nginx/html
    links:
      - db
  db:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: pass

  phpmyadmin:
    image: phpmyadmin
    ports:
      - 8080:80