version: '3.0'
services:
  nginx:
    image: nginx
    ports:
      - 8099:80
    volumes:
      - ./:/usr/share/nginx/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/log:/var/log/nginx
    links:
      - php
  php:
    build: ./docker/php/
    volumes:
      - ./:/usr/share/nginx/html
    links:
      - db
  db:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: pass

  phpmyadmin:
    image: phpmyadmin
    ports:
      - 8080:80